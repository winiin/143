<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Way</title>
<link rel="icon" type="image/png" href="logo.png">
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<!-- EmailJS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<!-- PDF.js for client-side PDF text extraction -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>

<!-- ══ AUTH ══ -->
<div id="authScreen" class="auth-screen">
  <div class="auth-glow g1"></div>
  <div class="auth-glow g2"></div>
  <div class="auth-box">

    <!-- LOGO -->
    <div class="auth-logo">
      <img src="logo.png" width="48" height="48" alt="My Way" style="border-radius:14px;display:block;"/>
      <div>
        <div class="auth-logo-name">My Way</div>
        <div class="auth-logo-sub" id="authSub">Твой финансовый путь</div>
      </div>
    </div>

    <!-- LANG -->
    <div class="auth-lang-row">
      <button class="lang-pill active" data-l="ru">🇷🇺 RU</button>
      <button class="lang-pill" data-l="kz">🇰🇿 KZ</button>
      <button class="lang-pill" data-l="en">🇬🇧 EN</button>
    </div>

    <!-- TABS -->
    <div class="auth-tabs">
      <button class="auth-tab active" data-auth="login" id="tabLogin">Войти</button>
      <button class="auth-tab" data-auth="register" id="tabRegister">Регистрация</button>
    </div>

    <!-- ── LOGIN ── -->
    <div id="loginForm" class="auth-form">
      <div class="fld">
        <i class="fas fa-envelope fi"></i>
        <input type="email" id="loginEmail" placeholder="Email" autocomplete="email"/>
      </div>
      <div class="fld">
        <i class="fas fa-lock fi"></i>
        <input type="password" id="loginPassword" placeholder="Пароль" autocomplete="current-password"/>

      </div>
      <div style="text-align:right;margin:-4px 0 12px;">
        <a href="#" id="forgotPassLink" style="font-size:11.5px;color:var(--acc2);text-decoration:none;font-weight:600;">Забыли пароль?</a>
      </div>
      <button class="btn btn-primary wf" id="loginBtn">
        <i class="fas fa-sign-in-alt"></i> <span id="loginBtnTxt">Войти</span>
      </button>

      <div class="auth-hint" id="authDemo">Демо: demo@myway.kz / Demo@123!</div>
      <div id="loginError" class="auth-error hidden"></div>
      <div id="loginSuccess" class="auth-success hidden"></div>
    </div>

    <!-- ── REGISTER ── -->
    <div id="registerForm" class="auth-form hidden">
      <div class="fld">
        <i class="fas fa-user fi"></i>
        <input type="text" id="regName" placeholder="Ваше имя" autocomplete="name"/>
      </div>
      <div class="fld">
        <i class="fas fa-envelope fi"></i>
        <input type="email" id="regEmail" placeholder="Email" autocomplete="email"/>
      </div>
      <div class="fld">
        <i class="fas fa-lock fi"></i>
        <input type="password" id="regPassword" placeholder="Пароль" autocomplete="new-password"/>
        <button class="pass-eye" id="eyeBtn" type="button"><i class="fas fa-eye"></i></button>
      </div>
      <div class="pass-rules" id="passRules">
        <span id="pr-len" class="pr">• Мин. 6 символов</span>
        <span id="pr-upper" class="pr">• 1 заглавная буква</span>
        <span id="pr-lower" class="pr">• 1 строчная буква</span>
        <span id="pr-num" class="pr">• 1 цифра</span>
        <span id="pr-spec" class="pr">• 1 спецсимвол (!@#$...)</span>
      </div>
      <button class="btn btn-primary wf" id="registerBtn">
        <i class="fas fa-user-plus"></i> <span id="registerBtnTxt">Создать аккаунт</span>
      </button>
      <div id="registerError" class="auth-error hidden"></div>
      <div id="registerSuccess" class="auth-success hidden"></div>
    </div>

    </div>

  </div>
</div>

<!-- ══ APP ══ -->
<div id="app" class="hidden app-layout">
  <aside id="sidebar" class="sidebar">
    <div class="sb-logo">
      <img src="logo.png" width="30" height="30" alt="My Way" style="border-radius:9px;display:block;"/>
      <span class="sb-logo-name">My Way</span>
    </div>
    <nav id="nav" class="sb-nav"></nav>
    <div class="sb-bottom">
      <div id="sbUser" class="sb-user"></div>
    </div>
  </aside>
  <div class="main-area">
    <header id="header" class="topbar"></header>
    <main id="content" class="content-area"></main>
    <footer id="footer" class="bottombar"></footer>
  </div>
</div>

<!-- ══ AI CHAT ══ -->
<div id="aiChat" class="ai-bubble hidden">
  <div class="ai-window" id="aiWindow">
    <div class="ai-win-hdr">
      <div class="ai-win-title">
        <div class="ai-av"><i class="fas fa-robot"></i></div>
        <div>
          <div id="aiWinName" style="font-weight:700;font-size:13px;">ИИ-советник</div>
          <div style="font-size:10px;opacity:.6;">My Way AI</div>
        </div>
      </div>
      <button id="aiClose" class="ai-close-btn">✕</button>
    </div>
    <div id="aiMessages" class="ai-messages"></div>
    <div class="ai-inp-row">
      <input type="text" id="aiInput" placeholder="Задайте вопрос..."/>
      <button id="aiSend" class="btn btn-primary btn-sm"><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>
  <button id="aiToggle" class="ai-toggle-btn">
    <i class="fas fa-robot"></i>
    <span class="ai-badge">AI</span>
  </button>
</div>

<script src="app.js"></script>
</body>
</html>

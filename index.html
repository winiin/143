<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinLife</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <!-- Экран авторизации -->
    <div id="authScreen" class="auth-screen">
        <div class="auth-box">
            <div class="auth-logo">
                <i class="fas fa-coins"></i>
                <span>FinLife</span>
                <small>v3.0</small>
            </div>
            <div class="auth-tabs">
                <button class="auth-tab active" data-auth="login">Войти</button>
                <button class="auth-tab" data-auth="register">Регистрация</button>
            </div>
            <div id="loginForm" class="auth-form">
                <input type="email" id="loginEmail" placeholder="Email" />
                <input type="password" id="loginPassword" placeholder="Пароль" />
                <button class="btn btn-primary w-full" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Войти</button>
                <div class="auth-hint">Демо: demo@finlife.kz / demo123</div>
            </div>
            <div id="registerForm" class="auth-form hidden">
                <input type="text" id="regName" placeholder="Ваше имя" />
                <input type="email" id="regEmail" placeholder="Email" />
                <input type="password" id="regPassword" placeholder="Пароль (мин. 6 символов)" />
                <button class="btn btn-success w-full" id="registerBtn"><i class="fas fa-user-plus"></i> Создать аккаунт</button>
            </div>
        </div>
    </div>

    <!-- Основное приложение -->
    <div id="app" class="hidden">
        <header id="header"></header>
        <nav id="nav"></nav>
        <main id="content"></main>
        <footer id="footer"></footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
